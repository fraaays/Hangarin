{% load socialaccount %}
{% load static %}

<!DOCTYPE html>
<html>
<head>
<title>Hangarin Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.2/mdb.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
body{
    background:#f5f6fa;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{
    width:420px;
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.social-icons a{
    font-size:22px;
    margin:0 10px;
    color:#555;
}

.social-icons a:hover{
    color:#0d6efd;
}

.tab-btn{
    width:50%;
}

</style>

</head>

<body>

<div class="login-card">

<!-- Tabs -->
<ul class="nav nav-tabs mb-4">
  <li class="nav-item tab-btn">
    <a class="nav-link active text-center">LOGIN</a>
  </li>
  <li class="nav-item tab-btn">
    <a class="nav-link text-center" href="/accounts/signup/">REGISTER</a>
  </li>
</ul>

<h5 class="text-center mb-3">Sign in with:</h5>

<div class="text-center social-icons mb-3">

<a href="{% provider_login_url 'google' %}">
<i class="fab fa-google"></i>
</a>

<a href="#" class="btn btn-link btn-floating mx-1">
<i class="fab fa-github"></i>
</a>

</div>

<p class="text-center">or:</p>

<form method="post" action="{% url 'account_login' %}">
{% csrf_token %}

<label>Email or Username</label>
<input type="text" name="login" class="form-control" required>

<br>

<label>Password</label>
<input type="password" name="password" class="form-control" required>

<br>

<div class="d-flex justify-content-between mb-3">

<div>
<input type="checkbox" name="remember">
<label>Remember me</label>
</div>

<a href="/accounts/password/reset/">Forgot password?</a>

</div>

<button type="submit" class="btn btn-primary w-100">
SIGN IN
</button>

</form>

</div>

</body>
</html>
