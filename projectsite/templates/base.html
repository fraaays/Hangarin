<!DOCTYPE html>
<html>
<head>
<title>Hangarin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<!-- ChartJS for dashboard charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    background:#eef2f7;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* SIDEBAR */

.sidebar{
    height:100vh;
    width:230px;
    position:fixed;
    background:#1e293b;
    color:white;
    padding-top:20px;
    transition:all 0.3s;
    overflow:visible;
}

/* collapse sidebar but keep edge */

.sidebar.collapsed{
    margin-left:-230px;
}

/* sidebar header */

.sidebar-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px 20px 20px;
}

.sidebar h4{
    margin:0;
    font-weight:600;
}

/* toggle button */

.sidebar-toggle{
    border:none;
    background:#334155;
    color:white;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

.sidebar.collapsed .sidebar-toggle{
    position:fixed;
    left:10px;
    top:15px;
    z-index:1000;
}

.sidebar-toggle:hover{
    background:#475569;
}

/* sidebar links */

.sidebar a{
    display:block;
    color:#cbd5e1;
    padding:12px 20px;
    text-decoration:none;
    transition:all 0.2s;
}

/* hover */

.sidebar a:hover{
    background:#334155;
    color:white;
}

/* active page highlight */

.sidebar a.active{
    background:#4f8df5;
    color:white;
}

/* MAIN CONTENT */

.main{
    margin-left:230px;
    padding:25px 35px 35px 35px;
}

/* expand when sidebar collapsed */

.main.full{
    margin-left:60px;
}

/* DASHBOARD CARDS */

.dashboard-card{
    border-radius:14px;
    padding:22px;
    color:white;
    box-shadow:0 6px 16px rgba(0,0,0,0.08);
    transition:transform 0.2s;
}

.dashboard-card:hover{
    transform:translateY(-4px);
}

/* card colors */

.card-blue{
    background:linear-gradient(135deg,#4f8df5,#3b6edc);
}

.card-orange{
    background:linear-gradient(135deg,#ffb347,#ff9800);
}

.card-green{
    background:linear-gradient(135deg,#2ecc71,#16a085);
}

.card-purple{
    background:linear-gradient(135deg,#7b6cf6,#5b55d4);
}

/* card numbers */

.card-number{
    font-size:28px;
    font-weight:600;
}

/* tables */

.table{
    background:white;
    border-radius:10px;
    overflow:hidden;
}

.card{
    border:none;
    border-radius:12px;
}

.status-badge{
    display:inline-flex;
    justify-content:center;
    align-items:center;
    width:130px;
    height:34px;
    font-weight:600;
    border-radius:8px;
}

.priority-badge{
    display:inline-flex;
    justify-content:center;
    align-items:center;
    width:100px;
    height:32px;
    font-weight:600;
    border-radius:8px;
}

.deadline-cell{
    white-space:nowrap;
}

.table td{
    vertical-align: middle;
}

.action-icons i{
    font-size:18px;
}

.action-icons a{
    text-decoration:none;
}

.dropdown-card{
    display:none;
    position:absolute;
    right:0;
    top:55px;
    width:230px;
    background:white;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    z-index:9999;
    overflow:hidden;
    animation:fadeIn 0.2s ease;
}

/* small arrow pointer */
.dropdown-card::before{
    content:"";
    position:absolute;
    top:-8px;
    right:18px;
    width:15px;
    height:15px;
    background:white;
    transform:rotate(45deg);
}

/* header */
.dropdown-header{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #eee;
}

.dropdown-header strong{
    font-size:15px;
}

.dropdown-header small{
    color:#777;
}

/* items */
.dropdown-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 16px;
    text-decoration:none;
    color:#333;
    font-size:15px;
    transition:all 0.2s;
}

.dropdown-item:hover{
    background:#f5f7fb;
}

.dropdown-item i{
    font-size:18px;
}

/* logout style */
.dropdown-item.logout{
    color:#e74c3c;
}

.dropdown-item.logout:hover{
    background:#fdecea;
}

/* animation */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(-6px);}
    to{opacity:1; transform:translateY(0);}
}
.profile-btn{
    border:none;
    background:none;
    cursor:pointer;
    padding:0;
}

/* container */
.avatar-wrapper{
    position:relative;
    width:42px;
    height:42px;
}

/* avatar */
.avatar-wrapper img,
.avatar-fallback{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #4f8df5;
}

/* fallback */
.avatar-fallback{
    background:#6c63ff;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}

/* 🔥 THIS IS THE KEY FIX */
.dropdown-badge{
    position:absolute;
    bottom: 2px;
    right: 9px;
    transform:translate(25%, 25%);
    width:18px;
    height:18px;
    background:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.25);
}

/* arrow */
.dropdown-badge i{
    font-size:10px;
    color:#333;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="sidebar-header">

<h4>Hangarin</h4>

<button onclick="toggleSidebar()" class="sidebar-toggle">
<i class="bi bi-list"></i>
</button>

</div>

<a href="{% url 'dashboard' %}" class="{% if request.path == '/' %}active{% endif %}">
<i class="bi bi-speedometer2"></i> Dashboard
</a>

<a href="{% url 'task_list' %}">
<i class="bi bi-list-check"></i> Tasks
</a>

<a href="{% url 'subtask_list' %}">
<i class="bi bi-check2-square"></i> SubTasks
</a>

<a href="{% url 'note_list' %}">
<i class="bi bi-journal-text"></i> Notes
</a>

<a href="{% url 'category_list' %}">
<i class="bi bi-folder"></i> Categories
</a>

<a href="{% url 'priority_list' %}">
<i class="bi bi-flag"></i> Priorities
</a>

<div class="sidebar-bottom">

<a href="/admin/" target="_blank">
<i class="bi bi-person-lock"></i> Admin Login
</a>

</div>

</div>

<!-- MAIN CONTENT -->

<div class="main" style="position:relative;">
<!-- PROFILE DROPDOWN (IMPROVED UI) -->
<div style="position:absolute; top:20px; right:30px;">

    <div class="profile-dropdown" style="position:relative;">

        <!-- Profile Button -->
        <button onclick="toggleDropdown()" 
            style="border:none; background:none; cursor:pointer; display:flex; align-items:center; gap:5px;">
            
            {% if user.is_authenticated and user.socialaccount_set.all %}
                <img src="{{ user.socialaccount_set.all.0.get_avatar_url }}"
                     style="width:42px; height:42px; border-radius:50%; border:2px solid #4f8df5;">
            {% else %}
                <div style="width:42px; height:42px; border-radius:50%;
                            background:#6c63ff; color:white; display:flex;
                            align-items:center; justify-content:center;
                            font-weight:bold;">
                    {{ user.username|first|upper }}
                </div>
            {% endif %}
            <div class="dropdown-badge">
                <i class="bi bi-chevron-down"></i>
            </div>

        </button>

        <!-- Dropdown -->
        <div id="dropdownMenu" class="dropdown-card">

            <div class="dropdown-header">
                {% if user.is_authenticated %}
                    <strong>{{ user.username }}</strong><br>
                    <small>{{ user.email }}</small>
                {% endif %}
            </div>

            <hr>

            <a href="#" class="dropdown-item">
                <i class="bi bi-person"></i> Profile
            </a>

            <a href="/accounts/logout/" class="dropdown-item logout">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>

        </div>

    </div>

</div>

{% block content %}
{% endblock %}

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

function toggleSidebar(){

    const sidebar = document.querySelector(".sidebar");
    const main = document.querySelector(".main");

    sidebar.classList.toggle("collapsed");
    main.classList.toggle("full");

}

// DROPDOWN FUNCTION
function toggleDropdown() {
    const menu = document.getElementById("dropdownMenu");
    const arrow = document.querySelector(".bi-chevron-down");

    if (menu.style.display === "block") {
        menu.style.display = "none";
        if (arrow) arrow.style.transform = "rotate(0deg)";
    } else {
        menu.style.display = "block";
        if (arrow) arrow.style.transform = "rotate(180deg)";
    }
}

// CLOSE DROPDOWN WHEN CLICK OUTSIDE
window.onclick = function(event) {
    if (!event.target.closest('.profile-dropdown')) {
        const menu = document.getElementById("dropdownMenu");
        if (menu) {
            menu.style.display = "none";
        }
    }
}

</script>

</body>
</html>
