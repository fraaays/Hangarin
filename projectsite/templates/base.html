<!DOCTYPE html>
<html>
<head>
<title>Hangarin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<!-- ChartJS for dashboard charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    background:#eef2f7;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* SIDEBAR */

.sidebar{
    height:100vh;
    width:230px;
    position:fixed;
    background:#1e293b;
    color:white;
    padding-top:20px;
    transition:all 0.3s;
    overflow:visible;
}

/* collapse sidebar but keep edge */

.sidebar.collapsed{
    margin-left:-230px;
}

/* sidebar header */

.sidebar-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px 20px 20px;
}

.sidebar h4{
    margin:0;
    font-weight:600;
}

/* toggle button */

.sidebar-toggle{
    border:none;
    background:#334155;
    color:white;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

.sidebar.collapsed .sidebar-toggle{
    position:fixed;
    left:10px;
    top:15px;
    z-index:1000;
}

.sidebar-toggle:hover{
    background:#475569;
}

/* sidebar links */

.sidebar a{
    display:block;
    color:#cbd5e1;
    padding:12px 20px;
    text-decoration:none;
    transition:all 0.2s;
}

/* hover */

.sidebar a:hover{
    background:#334155;
    color:white;
}

/* active page highlight */

.sidebar a.active{
    background:#4f8df5;
    color:white;
}

/* MAIN CONTENT */

.main{
    margin-left:230px;
    padding:35px;
    transition:margin-left 0.3s ease;
}

/* expand when sidebar collapsed */

.main.full{
    margin-left:60px;
}

/* DASHBOARD CARDS */

.dashboard-card{
    border-radius:14px;
    padding:22px;
    color:white;
    box-shadow:0 6px 16px rgba(0,0,0,0.08);
    transition:transform 0.2s;
}

.dashboard-card:hover{
    transform:translateY(-4px);
}

/* card colors */

.card-blue{
    background:linear-gradient(135deg,#4f8df5,#3b6edc);
}

.card-orange{
    background:linear-gradient(135deg,#ffb347,#ff9800);
}

.card-green{
    background:linear-gradient(135deg,#2ecc71,#16a085);
}

.card-purple{
    background:linear-gradient(135deg,#7b6cf6,#5b55d4);
}

/* card numbers */

.card-number{
    font-size:28px;
    font-weight:600;
}

/* tables */

.table{
    background:white;
    border-radius:10px;
    overflow:hidden;
}

.card{
    border:none;
    border-radius:12px;
}

.status-badge{
    display:inline-flex;
    justify-content:center;
    align-items:center;
    width:130px;
    height:34px;
    font-weight:600;
    border-radius:8px;
}

.priority-badge{
    display:inline-flex;
    justify-content:center;
    align-items:center;
    width:100px;
    height:32px;
    font-weight:600;
    border-radius:8px;
}

.deadline-cell{
    white-space:nowrap;
}

.table td{
    vertical-align: middle;
}

.action-icons i{
    font-size:18px;
}

.action-icons a{
    text-decoration:none;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="sidebar-header">

<h4>Hangarin</h4>

<button onclick="toggleSidebar()" class="sidebar-toggle">
<i class="bi bi-list"></i>
</button>

</div>

<a href="{% url 'dashboard' %}" class="{% if request.path == '/' %}active{% endif %}">
<i class="bi bi-speedometer2"></i> Dashboard
</a>

<a href="{% url 'task_list' %}">
<i class="bi bi-list-check"></i> Tasks
</a>

<a href="{% url 'subtask_list' %}">
<i class="bi bi-check2-square"></i> SubTasks
</a>

<a href="{% url 'note_list' %}">
<i class="bi bi-journal-text"></i> Notes
</a>

<a href="{% url 'category_list' %}">
<i class="bi bi-folder"></i> Categories
</a>

<a href="{% url 'priority_list' %}">
<i class="bi bi-flag"></i> Priorities
</a>

<div class="sidebar-bottom">

<a href="/admin/" target="_blank">
<i class="bi bi-person-lock"></i> Admin Login
</a>

</div>

</div>

<!-- MAIN CONTENT -->

<div class="main">

{% block content %}
{% endblock %}

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

function toggleSidebar(){

    const sidebar = document.querySelector(".sidebar");
    const main = document.querySelector(".main");

    sidebar.classList.toggle("collapsed");
    main.classList.toggle("full");

}

</script>

</body>
</html>
