{% extends "base.html" %}

{% block content %}

<div class="container" style="max-width:750px;">

<div class="card shadow-lg border-0">

<!-- CARD HEADER -->
<div class="card-header bg-primary text-white">
<h4 class="mb-0">
<i class="bi bi-pencil-square"></i> Update Task
</h4>
</div>

<div class="card-body p-4">

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label class="form-label fw-semibold">
<i class="bi bi-type"></i> Title
</label>
{{ form.title }}
</div>

<div class="mb-3">
<label class="form-label fw-semibold">
<i class="bi bi-card-text"></i> Description
</label>
{{ form.description }}
</div>

<div class="mb-3">
<label class="form-label fw-semibold">
<i class="bi bi-calendar-event"></i> Deadline
</label>
{{ form.deadline }}
</div>

<div class="row">

<div class="col-md-4 mb-3">
<label class="form-label fw-semibold">
<i class="bi bi-flag"></i> Status
</label>
{{ form.status }}
</div>

<div class="col-md-4 mb-3">
<label class="form-label fw-semibold">
<i class="bi bi-folder"></i> Category
</label>
{{ form.category }}
</div>

<div class="col-md-4 mb-3">
<label class="form-label fw-semibold">
<i class="bi bi-exclamation-circle"></i> Priority
</label>
{{ form.priority }}
</div>

</div>

<div class="d-flex gap-2 mt-3">

<button class="btn btn-success px-4">
<i class="bi bi-check-lg"></i> Save
</button>

<a href="{% url 'task_list' %}" class="btn btn-outline-secondary">
Cancel
</a>

</div>

</form>

</div>

</div>

</div>

{% endblock %}
