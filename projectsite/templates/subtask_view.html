{% extends "base.html" %}

{% block content %}

<div class="card shadow-sm p-4" style="max-width:900px; margin:auto;">

<h2 class="fw-semibold mb-3">SubTask Details</h2>

<hr>

<div class="mb-3">
<strong>Parent Task:</strong>
<span class="ms-2">{{ subtask.parent_task.title }}</span>
</div>

<div class="mb-3">
<strong>Title:</strong>
<span class="ms-2">{{ subtask.title }}</span>
</div>

<div class="mb-4">
<strong>Status:</strong>

<span class="badge ms-2 px-3 py-2
{% if subtask.status == 'Pending' %}
bg-secondary
{% elif subtask.status == 'In Progress' %}
bg-warning text-dark
{% elif subtask.status == 'Completed' %}
bg-success
{% endif %}
">
{{ subtask.status }}
</span>

</div>

<div class="mt-3">

<a href="{% url 'subtask_list' %}" class="btn btn-outline-secondary px-4">
<i class="bi bi-arrow-left"></i> Back
</a>

</div>

</div>

{% endblock %}
