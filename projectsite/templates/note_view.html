{% extends "base.html" %}

{% block content %}

<div class="card shadow-sm p-4">

<h3 class="fw-semibold mb-3">Note Details</h3>

<hr>

<p><strong>Task:</strong> {{ note.task.title }}</p>

<p><strong>Content:</strong></p>

<div class="border rounded p-3 bg-light">
{{ note.content }}
</div>

<p class="mt-3">
<strong>Created:</strong>
{{ note.created_at|date:"M d, Y H:i" }}
</p>

<div class="mt-4">

<a href="{% url 'note_list' %}" class="btn btn-outline-secondary px-4">
<i class="bi bi-arrow-left"></i> Back
</a>

</div>

</div>

{% endblock %}
