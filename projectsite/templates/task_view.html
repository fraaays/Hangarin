{% extends "base.html" %}

{% block content %}

<div class="container">

<h2 class="mb-4 fw-semibold">Task Details</h2>

<div class="card shadow-sm">

<div class="card-body">

<h4 class="mb-3">{{ task.title }}</h4>

<p class="text-muted">
{{ task.description }}
</p>

<hr>

<div class="row mb-2">

<div class="col-md-3 fw-semibold">
Status
</div>

<div class="col-md-9">
<span class="badge bg-secondary">
{{ task.status }}
</span>
</div>

</div>

<div class="row mb-2">

<div class="col-md-3 fw-semibold">
Priority
</div>

<div class="col-md-9">
<span class="badge bg-danger">
{{ task.priority }}
</span>
</div>

</div>

<div class="row mb-2">

<div class="col-md-3 fw-semibold">
Category
</div>

<div class="col-md-9">
{{ task.category }}
</div>

</div>

<div class="row mb-2">

<div class="col-md-3 fw-semibold">
Deadline
</div>

<div class="col-md-9">
{{ task.deadline|date:"F d, Y" }}
</div>

</div>

<hr>

<div class="mt-3">

<a href="{% url 'task_list' %}" class="btn btn-secondary">
<i class="bi bi-arrow-left"></i> Back
</a>

<a href="{% url 'task_update' task.id %}" class="btn btn-warning">
<i class="bi bi-pencil"></i> Edit
</a>

</div>

</div>

</div>

</div>

{% endblock %}
