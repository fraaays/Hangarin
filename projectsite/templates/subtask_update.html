{% extends "base.html" %}

{% block content %}

<div class="container d-flex justify-content-center">

<div class="card shadow-lg border-0 mt-4" style="max-width:650px; width:100%;">

<!-- HEADER -->
<div class="card-header bg-success text-white py-3">
<h4 class="mb-0">
<i class="bi bi-check2-square"></i> Update SubTask
</h4>
</div>

<div class="card-body p-4">

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label class="form-label fw-semibold">
<i class="bi bi-diagram-3"></i> Parent Task
</label>
{{ form.parent_task }}
</div>

<div class="mb-3">
<label class="form-label fw-semibold">
<i class="bi bi-type"></i> Title
</label>
{{ form.title }}
</div>

<div class="mb-4">
<label class="form-label fw-semibold">
<i class="bi bi-flag"></i> Status
</label>
{{ form.status }}
</div>

<hr>

<div class="d-flex justify-content-end gap-2">

<a href="{% url 'subtask_list' %}" class="btn btn-outline-secondary">
Cancel
</a>

<button class="btn btn-success px-4">
<i class="bi bi-check-lg"></i> Save
</button>

</div>

</form>

</div>

</div>

</div>

{% endblock %}
